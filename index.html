<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost Pitch Engine</title>
<style>
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --accent: #00ff88;
    --danger: #ff4444;
    --warn: #ffaa00;
    --ghost: #8b5cf6;
    --text: #e0e0e0;
    --dim: #666;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Fira Code', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* --- Header / Instrumentation --- */
  #header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 24px;
    background: var(--card);
    border-bottom: 1px solid #222;
    font-size: 13px;
  }
  #header .logo { color: var(--ghost); font-weight: bold; font-size: 16px; }
  #instrument {
    display: flex;
    gap: 24px;
    color: var(--dim);
  }
  #instrument span { color: var(--accent); }

  /* --- Main Stage --- */
  #stage {
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 32px;
  }

  /* --- Phase Indicator --- */
  #phase-indicator {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--dim);
    padding: 6px 16px;
    border: 1px solid #333;
    border-radius: 20px;
  }
  #phase-indicator.active { color: var(--accent); border-color: var(--accent); }
  #phase-indicator.listening { color: var(--warn); border-color: var(--warn); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

  /* --- Ghost Card --- */
  .ghost-card {
    background: var(--card);
    border: 1px solid #222;
    border-radius: 12px;
    padding: 32px;
    width: 100%;
    max-width: 700px;
    position: relative;
    overflow: hidden;
  }
  .ghost-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--ghost), var(--accent));
  }
  .ghost-card h2 {
    color: var(--ghost);
    font-size: 22px;
    margin-bottom: 8px;
  }
  .ghost-card .ghost-type {
    color: var(--dim);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }
  .ghost-card .pitch {
    font-size: 15px;
    line-height: 1.6;
    color: var(--text);
  }

  /* --- Crowd Meter --- */
  #crowd-meter-container {
    width: 100%;
    max-width: 700px;
    display: none;
  }
  #crowd-meter-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--dim);
    margin-bottom: 8px;
  }
  #crowd-meter-bar {
    width: 100%;
    height: 40px;
    background: #1a1a2e;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
  }
  #crowd-meter-fill {
    height: 100%;
    width: 0%;
    transition: width 0.1s, background 0.3s;
    background: var(--accent);
    border-radius: 8px;
  }
  #crowd-meter-fill.boo { background: var(--danger); }
  #crowd-meter-fill.cheer { background: var(--accent); }
  #crowd-meter-fill.dead { background: var(--dim); }
  #crowd-sentiment {
    font-size: 14px;
    text-align: center;
    margin-top: 8px;
    min-height: 20px;
  }

  /* --- Judge Panel --- */
  .judge-panel {
    display: flex;
    gap: 16px;
    width: 100%;
    max-width: 700px;
  }
  .judge-card {
    flex: 1;
    background: var(--card);
    border: 1px solid #222;
    border-radius: 8px;
    padding: 16px;
    font-size: 13px;
  }
  .judge-card h3 {
    color: var(--ghost);
    font-size: 14px;
    margin-bottom: 8px;
  }
  .judge-card .verdict { margin-top: 8px; font-style: italic; color: var(--dim); }

  /* --- Log / Transcript --- */
  #transcript {
    width: 100%;
    max-width: 700px;
    background: var(--card);
    border: 1px solid #222;
    border-radius: 8px;
    padding: 16px;
    font-size: 12px;
    max-height: 200px;
    overflow-y: auto;
    color: var(--dim);
    line-height: 1.8;
  }
  #transcript .log-entry { }
  #transcript .log-entry .ts { color: #444; margin-right: 8px; }
  #transcript .log-entry .msg { color: var(--text); }
  #transcript .log-entry .model { color: var(--ghost); }
  #transcript .log-entry .tokens { color: var(--accent); }

  /* --- Controls --- */
  #controls {
    display: flex;
    gap: 16px;
    margin-top: 16px;
  }
  button {
    font-family: inherit;
    font-size: 14px;
    padding: 12px 32px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  button:hover { transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  #btn-start {
    background: var(--ghost);
    color: white;
  }
  #btn-overdrive {
    background: var(--danger);
    color: white;
    display: none;
  }
  #btn-skip {
    background: transparent;
    border: 1px solid #333;
    color: var(--dim);
    display: none;
  }

  /* --- OVERDRIVE --- */
  #overdrive-panel {
    width: 100%;
    max-width: 700px;
    display: none;
  }
  #overdrive-panel h2 {
    color: var(--danger);
    font-size: 28px;
    text-align: center;
    margin-bottom: 16px;
    animation: overdrive-flash 0.5s infinite;
  }
  @keyframes overdrive-flash {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }
  #build-log {
    background: #000;
    border: 1px solid var(--danger);
    border-radius: 8px;
    padding: 16px;
    font-size: 13px;
    max-height: 400px;
    overflow-y: auto;
    white-space: pre-wrap;
    color: var(--accent);
  }
  #qr-container {
    text-align: center;
    margin-top: 24px;
    display: none;
  }

  /* --- Utility --- */
  .hidden { display: none !important; }
  .fade-in { animation: fadeIn 0.5s ease-in; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>

// ============================================================
// STATE
// ============================================================
const state = {

// ============================================================
// DOM REFS
// ============================================================

// ============================================================
// LOGGING
// ============================================================
function log(msg, { model, tokens } = {}) {
  const ts = ((Date.now() - (state.startTime || Date.now())) / 1000).toFixed(1);
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  let html = `<span class="ts">${ts}s</span>`;
  if (model) html += `<span class="model">[${model}]</span> `;
  html += `<span class="msg">${msg}</span>`;
  if (tokens) html += ` <span class="tokens">(${tokens} tok)</span>`;
  entry.innerHTML = html;
  dom.transcript.appendChild(entry);
  dom.transcript.scrollTop = dom.transcript.scrollHeight;
}

function setPhase(phase, label) {
  state.phase = phase;
  dom.iPhase.textContent = phase;
  dom.phase.textContent = label || phase.toUpperCase();
  dom.phase.className = '';
  if (phase === 'crowd') dom.phase.classList.add('listening');
  else if (phase !== 'idle') dom.phase.classList.add('active');
}

function updateInstrument({ model, tokens } = {}) {
  if (model) dom.iModel.textContent = model.split('/').pop();
  if (tokens) {
    state.totalTokens += tokens;
    dom.iTokens.textContent = state.totalTokens;
  }
  dom.iElapsed.textContent = ((Date.now() - state.startTime) / 1000).toFixed(1) + 's';
}

// ============================================================
// LLM FRAMEWORK — base primitives for all model calls
// ============================================================

// --- llmCall: single model, single response ---
async function llmCall(model, messages, { temperature = 0.8, maxTokens = 1024, quiet = false } = {}) {
  const t0 = Date.now();
  updateInstrument({ model });
  if (!quiet) log(`Calling ${model.split('/').pop()}...`, { model });

  const res = await fetch(`${CONFIG.featherless.baseUrl}/chat/completions`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${CONFIG.featherless.apiKey}`,
    },
    body: JSON.stringify({ model, messages, temperature, max_tokens: maxTokens }),
  });

  if (!res.ok) {
    const err = await res.text();
    log(`ERROR: ${res.status} — ${err}`, { model });
    throw new Error(`Featherless ${res.status}: ${err}`);
  }

  const data = await res.json();
  const content = data.choices?.[0]?.message?.content || '';
  const usage = data.usage?.total_tokens || 0;
  const elapsed = ((Date.now() - t0) / 1000).toFixed(1);

  updateInstrument({ model, tokens: usage });
  if (!quiet) log(`Response in ${elapsed}s`, { model, tokens: usage });

  return { content, usage, elapsed, model };
}

// --- llmJSON: call + extract + parse JSON, with retry ---
async function llmJSON(model, messages, { temperature = 0.8, maxTokens = 512, retries = 1 } = {}) {
  for (let attempt = 0; attempt <= retries; attempt++) {
    try {
      const result = await llmCall(model, messages, { temperature, maxTokens, quiet: attempt > 0 });
      // Extract JSON object or array from response
      const objMatch = result.content.match(/\{[\s\S]*\}/);
      const arrMatch = result.content.match(/\[[\s\S]*\]/);
      const jsonStr = objMatch ? objMatch[0] : arrMatch ? arrMatch[0] : null;
      if (!jsonStr) throw new Error('No JSON found in response');
      return { ...result, parsed: JSON.parse(jsonStr) };
    } catch (e) {
      if (attempt === retries) {
        log(`JSON parse failed after ${retries + 1} attempts: ${e.message}`, { model });
        return { content: '', usage: 0, elapsed: '0', model, parsed: null };
      }
      log(`Retry ${attempt + 1}/${retries}...`, { model });
    }
  }
}

// --- llmFanOut: hit N models in parallel, collect successes ---
async function llmFanOut(models, messages, { temperature = 0.9, maxTokens = 512, parseJSON = false } = {}) {
  log(`Fan-out across ${models.length} models...`);
  const fn = parseJSON ? llmJSON : llmCall;
  const promises = models.map(model =>
    fn(model, messages, { temperature, maxTokens, quiet: true })
      .catch(e => { log(`${model.split('/').pop()} failed: ${e.message}`); return null; })
  );
  const results = await Promise.all(promises);
  const successes = results.filter(r => r && (parseJSON ? r.parsed !== null : r.content));
  log(`Fan-out: ${successes.length}/${models.length} succeeded`);
  return successes;
}

// --- llmStream: streaming call for OVERDRIVE build log ---
async function llmStream(model, messages, { temperature = 0.7, maxTokens = 2048, onChunk } = {}) {
  updateInstrument({ model });
  log(`Streaming from ${model.split('/').pop()}...`, { model });

  const res = await fetch(`${CONFIG.featherless.baseUrl}/chat/completions`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${CONFIG.featherless.apiKey}`,
    },
    body: JSON.stringify({ model, messages, temperature, max_tokens: maxTokens, stream: true }),
  });

  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Featherless stream ${res.status}: ${err}`);
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let full = '';
  let buffer = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    buffer = lines.pop(); // keep incomplete line
    for (const line of lines) {
      if (!line.startsWith('data: ') || line === 'data: [DONE]') continue;
      try {
        const chunk = JSON.parse(line.slice(6));
        const delta = chunk.choices?.[0]?.delta?.content || '';
        if (delta) {
          full += delta;
          if (onChunk) onChunk(delta, full);
        }
      } catch {}
    }
  }

  log(`Stream complete (${full.length} chars)`, { model });
  return { content: full, model };
}

// --- llmPick: choose best model for a task ---
function llmPick(purpose) {
  const m = CONFIG.featherless.models;
  switch (purpose) {
    case 'fast':    return m.corpus[m.corpus.length - 1]; // last = fastest
    case 'reason':  return m.corpus[0];                    // first = best reasoning
    case 'random':  return m.corpus[Math.floor(Math.random() * m.corpus.length)];
    case 'judge':   return Object.values(m.judges)[Math.floor(Math.random() * Object.values(m.judges).length)];
    default:        return m.corpus[0];
  }
}

// ============================================================
// TTS (Web Speech API)
// ============================================================
function getVoices() {
  return new Promise(resolve => {
    const voices = speechSynthesis.getVoices();
    if (voices.length) return resolve(voices);
    speechSynthesis.onvoiceschanged = () => resolve(speechSynthesis.getVoices());
  });
}

async function speak(text, { voiceIndex = 0, rate = CONFIG.tts.rate, pitch = CONFIG.tts.pitch } = {}) {
  return new Promise(async (resolve) => {
    const voices = await getVoices();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.voice = voices[voiceIndex % voices.length];
    utterance.rate = rate;
    utterance.pitch = pitch;
    utterance.onend = resolve;
    utterance.onerror = resolve;
    speechSynthesis.speak(utterance);
  });
}

// ============================================================
// CROWD DETECTION (Web Audio API)
// ============================================================
async function initMic() {
  if (state.audioCtx) return;
  state.audioCtx = new AudioContext();
  state.micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  const source = state.audioCtx.createMediaStreamSource(state.micStream);
  state.analyser = state.audioCtx.createAnalyser();
  state.analyser.fftSize = CONFIG.crowd.fftSize;
  source.connect(state.analyser);
}

function getFrequencyEnergy(lowHz, highHz) {
  const bufLen = state.analyser.frequencyBinCount;
  const data = new Uint8Array(bufLen);
  state.analyser.getByteFrequencyData(data);

  const nyquist = state.audioCtx.sampleRate / 2;
  const lowBin = Math.floor((lowHz / nyquist) * bufLen);
  const highBin = Math.floor((highHz / nyquist) * bufLen);

  let sum = 0;
  let count = 0;
  for (let i = lowBin; i <= highBin && i < bufLen; i++) {
    sum += data[i];
    count++;
  }
  return count > 0 ? sum / count : 0;
}

async function listenToCrowd() {
  await initMic();
  dom.crowdMeter.style.display = 'block';
  dom.crowdFill.style.width = '0%';
  dom.crowdFill.className = '';
  dom.crowdSentiment.textContent = '';

  setPhase('crowd', 'LISTENING');
  log('Mic open — react now!');

  return new Promise((resolve) => {
    const duration = CONFIG.crowd.reactionWindowMs;
    const interval = 100;
    let elapsed = 0;
    let peakHigh = 0;
    let peakLow = 0;
    let samples = [];

    const timer = setInterval(() => {
      elapsed += interval;
      const remaining = Math.ceil((duration - elapsed) / 1000);
      dom.crowdTimer.textContent = `${remaining}s`;

      const highE = getFrequencyEnergy(...CONFIG.crowd.cheerBandHz);
      const lowE = getFrequencyEnergy(...CONFIG.crowd.booBandHz);
      const total = (highE + lowE) / 2;

      peakHigh = Math.max(peakHigh, highE);
      peakLow = Math.max(peakLow, lowE);
      samples.push({ highE, lowE, total });

      // Update meter
      const pct = Math.min(100, (total / 128) * 100);
      dom.crowdFill.style.width = `${pct}%`;

      if (highE > lowE * 1.3) {
        dom.crowdFill.className = 'cheer';
      } else if (lowE > highE * 1.3) {
        dom.crowdFill.className = 'boo';
      } else {
        dom.crowdFill.className = total > CONFIG.crowd.dudThreshold ? '' : 'dead';
      }

      if (elapsed >= duration) {
        clearInterval(timer);

        // Calculate final score
        const avgHigh = samples.reduce((s, x) => s + x.highE, 0) / samples.length;
        const avgLow = samples.reduce((s, x) => s + x.lowE, 0) / samples.length;
        const avgTotal = samples.reduce((s, x) => s + x.total, 0) / samples.length;
        const energy = Math.round((avgTotal / 128) * 100);

        let sentiment;
        if (energy < CONFIG.crowd.dudThreshold) {
          sentiment = 'dead';
          dom.crowdSentiment.textContent = '...crickets';
          dom.crowdSentiment.style.color = 'var(--dim)';
        } else if (avgHigh > avgLow * 1.3) {
          sentiment = 'cheer';
          dom.crowdSentiment.textContent = 'CHEERS!';
          dom.crowdSentiment.style.color = 'var(--accent)';
        } else if (avgLow > avgHigh * 1.3) {
          sentiment = 'boo';
          dom.crowdSentiment.textContent = 'BOOOO!';
          dom.crowdSentiment.style.color = 'var(--danger)';
        } else {
          sentiment = 'mixed';
          dom.crowdSentiment.textContent = 'Mixed reactions...';
          dom.crowdSentiment.style.color = 'var(--warn)';
        }

        const score = { energy, sentiment, avgHigh, avgLow };
        state.crowdScores.push(score);
        log(`Crowd: ${sentiment} (energy: ${energy}%, high: ${avgHigh.toFixed(0)}, low: ${avgLow.toFixed(0)})`);
        resolve(score);
      }
    }, interval);
  });
}

// ============================================================
// GHOST GENERATION — Dev 2 customizes this section
// ============================================================

// Ghost generation prompt — Dev 2: edit this to shape ghost personalities
const GHOST_PROMPT = {
  system: 'You are a creative ghost at a hackathon. Return only valid JSON.',
  user: `You are a ghost haunting a tech hackathon in Berlin. Generate ONE creative startup idea as a ghost character.

Return ONLY valid JSON (no markdown, no code fences):
{"name": "Ghost Name (spooky/funny)", "type": "The Ghost of [something]", "pitch": "2-3 sentence startup pitch", "tagline": "One catchy line"}`,
};

// Failsafe ghost — always added last
const FAILSAFE_GHOST = {
  name: 'Der Speisekarten-Geist',
  type: 'The Ghost of Bad Translations',
  pitch: 'Point your phone at any German restaurant menu and get instant cultural translations. Not just words — context, allergens, local tips, and pronunciation. Never order Handkäse by accident again.',
  tagline: 'Lost in translation? This ghost eats menus for breakfast.',
};

async function generateGhosts() {
  setPhase('generating', 'SUMMONING GHOSTS');
  log('Summoning ghosts from the model swarm...');

  const models = CONFIG.featherless.models.corpus;
  const messages = [
    { role: 'system', content: GHOST_PROMPT.system },
    { role: 'user', content: GHOST_PROMPT.user },
  ];

  // Fan out to all models, parse JSON responses
  const results = await llmFanOut(models, messages, { temperature: 0.9, maxTokens: 256, parseJSON: true });
  state.ghosts = results.map(r => r.parsed);

  // Always add failsafe last
  state.ghosts.push(FAILSAFE_GHOST);

  log(`${state.ghosts.length} ghosts summoned`);
  return state.ghosts;
}

// ============================================================
// BOO — MC, Audience Judge, Announcer
// ============================================================
const BOO = {
  name: 'Boo',
  voiceIdx: 0,
  pitch: 0.6,
  rate: 1.1,
  backstory: 'You are Boo, the Ghost Host. You are the MC, the audience\'s voice, and the final announcer. You interpret crowd energy — cheers, boos, silence — and translate it into ghost verdicts. You are theatrical, dramatic, and a little unhinged. You love chaos.',
};

async function booSpeak(text) {
  await speak(text, { voiceIndex: BOO.voiceIdx, rate: BOO.rate, pitch: BOO.pitch });
}

async function booJudge(ghost, crowdScore) {
  const crowdText = crowdScore.sentiment === 'cheer' ? 'The living ROARED with approval!'
    : crowdScore.sentiment === 'boo' ? 'The living have REJECTED this ghost!'
    : crowdScore.sentiment === 'dead' ? 'Nothing. Not a sound. The living don\'t care.'
    : 'The living are... confused.';

  const { content } = await llmCall(llmPick('fast'), [
    { role: 'system', content: `${BOO.backstory} Speak as Boo. ONE dramatic sentence about the crowd's reaction. Channel the energy.` },
    { role: 'user', content: `The crowd just reacted to "${ghost.name}": ${crowdText} Energy: ${crowdScore.energy}%. Translate this for the judges.` },
  ], { temperature: 0.9, maxTokens: 50 });

  return content;
}

// ============================================================
// CHAOS JUDGES — Generated on the fly by Boo
// ============================================================
async function summonChaosJudges(ghost) {
  log('Boo is summoning chaos judges...');
  setPhase('chaos', 'SUMMONING CHAOS');

  const result = await llmJSON(llmPick('reason'), [
    { role: 'system', content: 'Generate 2 absurd ghost judge characters in JSON array. Each has a name, a ridiculous backstory (1 sentence — how they died), and what they judge (1 sentence). Be unhinged and funny. Return ONLY a JSON array, no markdown.' },
    { role: 'user', content: `These judges are evaluating: "${ghost.name}" — ${ghost.pitch}. Make them relevant but absurd.` },
  ], { temperature: 1.0, maxTokens: 256 });

  if (result.parsed && Array.isArray(result.parsed)) {
    return result.parsed.slice(0, 2).map((j, i) => ({
      name: j.name || `Chaos Ghost ${i + 1}`,
      backstory: j.backstory || 'Died of pure chaos.',
      judges: j.judges || j.what_they_judge || 'vibes',
      voiceIdx: 8 + i,
    }));
  }
  // Fallback chaos judges
  return [
    { name: 'Gary the Unpredictable', backstory: 'Died by tripping over a USB cable.', judges: 'whether the name sounds cool', voiceIdx: 8 },
    { name: 'The Void', backstory: 'Was never born. Just appeared.', judges: 'cosmic relevance', voiceIdx: 9 },
  ];
}

// ============================================================
// JUDGE DELIBERATION
// ============================================================
async function judgeGhost(ghost, crowdScore, round = 1) {
  const models = Object.values(CONFIG.featherless.models.judges);
  const coreJudges = CONFIG.judges.map((j, i) => ({
    ...j,
    model: models[i % models.length],
    style: j.backstory,
  }));

  dom.judgePanel.innerHTML = '';
  dom.judgePanel.classList.remove('hidden');

  // Boo announces crowd reaction first
  const booVerdict = await booJudge(ghost, crowdScore);
  const booCard = document.createElement('div');
  booCard.className = 'judge-card';
  booCard.style.borderColor = 'var(--warn)';
  booCard.innerHTML = `<h3 style="color: var(--warn)">Boo (The Crowd)</h3><div class="verdict">${booVerdict}</div>`;
  dom.judgePanel.appendChild(booCard);
  setPhase('judging', 'BOO SPEAKS');
  await booSpeak(booVerdict);

  const crowdContext = `Boo, the audience ghost, says: "${booVerdict}" (crowd energy: ${crowdScore.energy}%, sentiment: ${crowdScore.sentiment})`;

  const roundContext = round === 2
    ? 'This is your FINAL deliberation. You must reach a BUILD or NO BUILD verdict. Be decisive.'
    : 'Give your initial take. ONE sentence only — punchy and decisive.';

  // Core judges
  for (const judge of coreJudges) {
    const card = document.createElement('div');
    card.className = 'judge-card';
    card.innerHTML = `<h3>${judge.name}</h3><div class="verdict">Thinking...</div>`;
    dom.judgePanel.appendChild(card);

    const { content } = await llmCall(judge.model, [
      { role: 'system', content: `You are ${judge.name}, a ghost judge at a hackathon. ${judge.style} Speak in first person as a ghost. ONE sentence only — punchy and decisive. ${roundContext}` },
      { role: 'user', content: `Ghost pitch: "${ghost.name}" — ${ghost.pitch}\n\n${crowdContext}\n\nYour verdict (ONE sentence):` },
    ], { temperature: 0.7, maxTokens: 60 });

    card.querySelector('.verdict').textContent = content;
    setPhase('judging', `JUDGE: ${judge.name.toUpperCase()}`);
    await speak(content, { voiceIndex: judge.voiceIdx, rate: 1.2 });
  }

  // Round 2: summon chaos judges for extra drama
  if (round === 2) {
    const chaosJudges = await summonChaosJudges(ghost);
    for (const chaos of chaosJudges) {
      const card = document.createElement('div');
      card.className = 'judge-card';
      card.style.borderColor = 'var(--danger)';
      card.innerHTML = `<h3 style="color: var(--danger)">${chaos.name}</h3><div class="ghost-type">${chaos.backstory}</div><div class="verdict">Channeling...</div>`;
      dom.judgePanel.appendChild(card);

      const { content } = await llmCall(
        CONFIG.featherless.models.corpus[Math.floor(Math.random() * CONFIG.featherless.models.corpus.length)],
        [
          { role: 'system', content: `You are ${chaos.name}, a chaos ghost judge. ${chaos.backstory} You judge: ${chaos.judges}. ONE sentence verdict — be chaotic and funny.` },
          { role: 'user', content: `Ghost pitch: "${ghost.name}" — ${ghost.pitch}\n${crowdContext}\nYour chaotic verdict:` },
        ], { temperature: 1.0, maxTokens: 50 }
      );

      card.querySelector('.verdict').textContent = content;
      setPhase('judging', `CHAOS: ${chaos.name.toUpperCase()}`);
      await speak(content, { voiceIndex: chaos.voiceIdx, rate: 1.3 });
    }
  }
}

// ============================================================
// BUILD DECISION — Boo announces
// ============================================================
async function decideBuild(ghost, scores) {
  const model = CONFIG.featherless.models.judges.carla;
  const scoresSummary = scores.map((s, i) =>
    `Round ${i + 1}: ${s.sentiment} (${s.energy}%)`
  ).join(', ');

  const { content } = await llmCall(model, [
    { role: 'system', content: `You are Boo, the Ghost Host. ${BOO.backstory} Based on crowd reactions and judge verdicts, announce the FINAL verdict. Start with "BUILD!" or "NO BUILD!" Be dramatic. One sentence.` },
    { role: 'user', content: `Ghost: "${ghost.name}" — ${ghost.pitch}\nCrowd scores: ${scoresSummary}\nThe judges have deliberated. Your final announcement:` },
  ], { temperature: 0.6, maxTokens: 80 });

  log(`BOO VERDICT: ${content}`);
  setPhase('verdict', content.toUpperCase().includes('BUILD!') && !content.toUpperCase().includes('NO BUILD') ? 'BUILD!' : 'NO BUILD');
  await booSpeak(content);

  return content.toUpperCase().includes('BUILD') && !content.toUpperCase().includes('NO BUILD');
}

// ============================================================
// OVERDRIVE (Build + Deploy)
// ============================================================
async function overdrive(ghost) {
  setPhase('overdrive', 'OVERDRIVE');
  dom.overdrive.style.display = 'block';
  dom.buildLog.textContent = '';

  function buildLog(msg) {
    const ts = ((Date.now() - state.startTime) / 1000).toFixed(1);
    dom.buildLog.textContent += `[${ts}s] ${msg}\n`;
    dom.buildLog.scrollTop = dom.buildLog.scrollHeight;
    log(msg);
  }

  buildLog('OVERDRIVE ENGAGED');
  buildLog(`Building: ${ghost.name}`);
  buildLog(`Pitch: ${ghost.pitch}`);
  buildLog('');
  buildLog('Generating build spec...');

  // Generate a detailed spec using Featherless (streaming for live build log)
  const { content: spec } = await llmStream(llmPick('reason'), [
    { role: 'system', content: 'You are a senior engineer. Write a brief technical spec for a single-page web app. Include: what it does, the HTML structure, key JS functions needed. Keep it under 200 words. This will be fed to an AI coding agent.' },
    { role: 'user', content: `Build this app: ${ghost.name} — ${ghost.pitch}. It must be a single HTML file with embedded CSS and JS, mobile-friendly, deployable to Cloudflare Pages.` },
  ], { maxTokens: 512, onChunk: (delta) => { dom.buildLog.textContent += delta; dom.buildLog.scrollTop = dom.buildLog.scrollHeight; } });

  buildLog('Spec generated');
  buildLog(spec.substring(0, 200) + '...');
  buildLog('');
  buildLog('Triggering build agent via Jira...');

  // TODO: Trigger actual build via Jira API / familiar MCP
  // For now, show the spec and provide manual trigger
  buildLog('');
  buildLog('=== BUILD SPEC READY ===');
  buildLog('Waiting for agent to build and deploy...');
  buildLog(`Target: https://${ghost.name.toLowerCase().replace(/[^a-z0-9]/g, '-')}.${CONFIG.overdrive.deployDomain}`);

  await speak(`Overdrive engaged. Building ${ghost.name}. Stand by.`, { rate: 0.9, pitch: 0.7 });
}

// ============================================================
// SHOW RUNNER (Main flow)
// ============================================================
async function runShow() {
  state.startTime = Date.now();
  dom.btnStart.style.display = 'none';
  dom.btnSkip.style.display = 'inline-block';

  // Request mic permission early
  await initMic();

  // Phase 0: MC Ghost intro — fast, no calibration
  setPhase('intro', 'MC GHOST');
  log('MC Ghost taking the stage...');
  await speak(
    "Welcome, mortals. Startup ghosts are about to pitch you. " +
    "Cheer if you love it. Boo if you hate it. Silence kills. " +
    "If a ghost survives... we build it live. Let the haunting begin.",
    { voiceIndex: 0, rate: 1.1, pitch: 0.7 }
  );

  // Generate ghosts
  await generateGhosts();

  // Run through ghosts
  for (let i = 0; i < state.ghosts.length; i++) {
    state.currentGhostIdx = i;
    const ghost = state.ghosts[i];

    // Phase 1: Pitch
    setPhase('pitch', 'GHOST PITCH');
    dom.ghostCard.classList.remove('hidden');
    dom.ghostName.textContent = ghost.name;
    dom.ghostType.textContent = ghost.type;
    dom.ghostPitch.textContent = ghost.pitch;
    log(`Ghost ${i + 1}/${state.ghosts.length}: ${ghost.name}`);

    await speak(`I am ${ghost.name}. ${ghost.pitch}`, { voiceIndex: (i * 2 + 1) % 8, rate: 1.15 });

    // Phase 2: Crowd reaction #1
    const crowd1 = await listenToCrowd();

    if (crowd1.energy < CONFIG.crowd.dudThreshold) {
      log(`DUD — ghost banished (energy: ${crowd1.energy}%)`);
      await speak("Banished.", { voiceIndex: 0, rate: 1.2, pitch: 0.5 });
      dom.ghostCard.classList.add('hidden');
      dom.crowdMeter.style.display = 'none';
      continue;
    }

    // Phase 3: Judging Round 1
    setPhase('judging', 'JUDGING ROUND 1');
    await judgeGhost(ghost, crowd1, 1);

    // Phase 4: Crowd reaction #2
    await speak("Your turn.", { voiceIndex: 0, rate: 1.2, pitch: 0.7 });
    const crowd2 = await listenToCrowd();

    // Phase 5: Final deliberation
    setPhase('deliberation', 'FINAL DELIBERATION');
    await judgeGhost(ghost, crowd2, 2);

    // BUILD or NO BUILD
    const shouldBuild = await decideBuild(ghost, [crowd1, crowd2]);

    if (shouldBuild) {
      await overdrive(ghost);
      break;
    } else {
      await speak("Next ghost.", { voiceIndex: 0, rate: 1.2, pitch: 0.7 });
      dom.ghostCard.classList.add('hidden');
      dom.judgePanel.classList.add('hidden');
      dom.crowdMeter.style.display = 'none';
    }
  }
}

// ============================================================
// EVENT LISTENERS
// ============================================================
dom.btnStart.addEventListener('click', runShow);
dom.btnOverdrive.addEventListener('click', () => {
  // Manual override — force build current ghost
  if (state.currentGhostIdx >= 0) {
    overdrive(state.ghosts[state.currentGhostIdx]);
  }
});
dom.btnSkip.addEventListener('click', () => {
  // Skip current speech
  speechSynthesis.cancel();
});

// Update elapsed timer
setInterval(() => {
  if (state.startTime) {
    dom.iElapsed.textContent = ((Date.now() - state.startTime) / 1000).toFixed(1) + 's';
  }
}, 100);
</script>
